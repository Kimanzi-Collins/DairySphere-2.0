<svg width="520" height="140" viewBox="0 0 520 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DairySphere animated ribbon">
  <defs>
    <linearGradient id="ds-grad" x1="0" x2="1">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="50%" stop-color="#6d5ce7" />
      <stop offset="100%" stop-color="#4ea1ff" />
    </linearGradient>
    <filter id="ds-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feColorMatrix type="matrix" values="0 0 0 0 0.2  0 0 0 0 0.6  0 0 0 0 1  0 0 0 0.55 0" />
      <feBlend in="SourceGraphic" in2="blur" mode="screen" />
    </filter>
  </defs>

  <style>
    .ds-wave { stroke-dasharray: 240 520; animation: ds-dash 6s linear infinite; }
    .ds-orb { transform-origin: center; transform-box: fill-box; animation: ds-pulse 3s ease-in-out infinite; }
    .ds-float { transform-origin: center; transform-box: fill-box; animation: ds-float 4s ease-in-out infinite; }

    @keyframes ds-dash { to { stroke-dashoffset: -520; } }
    @keyframes ds-pulse { 0%, 100% { transform: scale(0.9); opacity: 0.75; } 50% { transform: scale(1.1); opacity: 1; } }
    @keyframes ds-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  </style>

  <rect x="20" y="20" width="480" height="100" rx="18" fill="#0b1220" opacity="0.7" />
  <path d="M40 90 C120 30, 200 120, 280 70 S420 40, 480 85" stroke="url(#ds-grad)" stroke-width="4" fill="none" filter="url(#ds-glow)" class="ds-wave" />
  <circle cx="260" cy="70" r="8" fill="#eaf6ff" class="ds-orb" />
  <circle cx="140" cy="62" r="3" fill="#9fb2d4" opacity="0.6" class="ds-float" />
  <circle cx="380" cy="78" r="2.5" fill="#9fb2d4" opacity="0.6" class="ds-float" />

  <text x="50%" y="58%" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="20" fill="#eaf6ff" opacity="0.92">DairySphere 2.0</text>
  <text x="50%" y="76%" text-anchor="middle" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="12" fill="#9fb2d4" opacity="0.9">Modern dairy operations suite</text>
</svg>
